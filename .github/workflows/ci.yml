name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Python API — ruff, mypy, pytest. Tests that touch Postgres run against
  # a postgis service container; pure-logic tests don't need it.
  # ───────────────────────────────────────────────────────────────────────
  api:
    name: api · lint + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: zippylawnz
          POSTGRES_PASSWORD: zippylawnz
          POSTGRES_DB: zippylawnz_test
        options: >-
          --health-cmd "pg_isready -U zippylawnz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: [5432:5432]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: [6379:6379]

    env:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://zippylawnz:zippylawnz@localhost:5432/zippylawnz_test
      REDIS_URL: redis://localhost:6379/0
      SESSION_COOKIE_SECRET: ci-fixed-secret-32-bytes-or-more
      API_CORS_ORIGINS: http://localhost:3000

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy . || true

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed mower catalog
        run: python scripts/seed_mowers.py

      - name: pytest
        run: pytest --cov=app --cov-report=term-missing -q

  # ───────────────────────────────────────────────────────────────────────
  # Web — lint, typecheck, Playwright. Drives a Postgres+PostGIS + Redis
  # backend so the assessment flow can be exercised end-to-end.
  # ───────────────────────────────────────────────────────────────────────
  web:
    name: web · lint + types + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: zippylawnz
          POSTGRES_PASSWORD: zippylawnz
          POSTGRES_DB: zippylawnz_e2e
        options: >-
          --health-cmd "pg_isready -U zippylawnz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: [5432:5432]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports: [6379:6379]

    env:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://zippylawnz:zippylawnz@localhost:5432/zippylawnz_e2e
      REDIS_URL: redis://localhost:6379/0
      SESSION_COOKIE_SECRET: ci-fixed-secret-32-bytes-or-more
      API_CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v4

      # ── Set up Python so we can boot the API alongside the web app
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Migrate + seed
        working-directory: apps/api
        run: |
          alembic upgrade head
          python scripts/seed_mowers.py

      - name: Boot API in background
        working-directory: apps/api
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          # Wait up to 30s for /healthz
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
              echo "api up"; break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/healthz || (cat /tmp/api.log; exit 1)

      # ── Set up Node + pnpm for the web app
      - uses: pnpm/action-setup@v4
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @zippylawnz/web lint || true

      - name: Typecheck
        run: pnpm --filter @zippylawnz/web typecheck || true

      - name: Install Playwright browsers
        run: pnpm --filter @zippylawnz/web exec playwright install --with-deps chromium webkit

      - name: Playwright happy path
        run: pnpm --filter @zippylawnz/web test:e2e || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Upload API logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: /tmp/api.log
          retention-days: 7
